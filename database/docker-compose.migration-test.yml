services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: herzgarten_migration_test
      POSTGRES_USER: herzgarten
      POSTGRES_PASSWORD: herzgarten
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herzgarten -d herzgarten_migration_test"]
      interval: 2s
      timeout: 5s
      retries: 30
