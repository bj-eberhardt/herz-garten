services:
  frontend:
    build:
      context: .
      target: dev
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://localhost:3000
      VITE_PROXY_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      target: dev
    command: sh -c "npm install && npm run dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://herzgarten:herzgarten@db:5432/herzgarten
      MIGRATIONS_DIR: /database/migrations
      JWT_SECRET: dev-only-herzgarten-secret
      CORS_ORIGIN: http://localhost:5173
      UPLOAD_DIR: /uploads
      PUSH_ENABLED: "${PUSH_ENABLED:-false}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@herzgarten.local}"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./database:/database:ro
      - backend_uploads:/uploads
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: herzgarten
      POSTGRES_USER: herzgarten
      POSTGRES_PASSWORD: herzgarten
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herzgarten -d herzgarten"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend_node_modules:
  backend_node_modules:
  backend_uploads:
  postgres_data:
